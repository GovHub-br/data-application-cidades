version: 2

sources:
  - name: raw
    schema: __dados_brutos
    description: >
      Schema de dados brutos do banco cidades.
      Contém os dados ingeridos das fontes GFAR, CAIXA e SNH para o programa MCMV.
    tables:
      - name: novo_mcmv_far_consolidado
        description: >
          Tabela consolidada do GFAR com todas as propostas FAR do Novo MCMV.
          Contém 15.091 registros (13.216 propostas únicas), incluindo propostas
          não contratadas, contratadas e distratadas. Todas as colunas são text.
      - name: novo_mcmv_far_cad_pj_mensal
        description: >
          Cadastro detalhado de pessoa jurídica (empreendimento) com 82 colunas.
          Contém 822 empreendimentos contratados com dados de composição financeira,
          coordenadas GPS, tipologia, construtora e datas-chave. Snapshot mensal.
      - name: novo_mcmv_far_obra_mensal
        description: >
          Dados de evolução física da obra com 40 colunas. Contém 822 registros
          (1 por empreendimento). Inclui percentual previsto/realizado, situação
          da obra, UHs concluídas e datas de paralisação/retomada.
      - name: novo_mcmv_far_financeiro_mensal
        description: >
          Dados de liberações financeiras com série temporal. Contém 6.069 registros
          para 638 APFs (média de 9,5 liberações por empreendimento). Detalha
          valores pagos por componente (obra, terreno, PTS, INCC).
      - name: dados_prioritarios_recebidos_caixa_empreendimentos
        description: >
          Dados prioritários recebidos da CAIXA com snapshot consolidado.
          Contém 4.443 empreendimentos FAR com situação, percentual de execução,
          valores contratados/desembolsados, UHs e coordenadas geográficas.
