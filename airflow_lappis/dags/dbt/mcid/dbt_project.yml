name: 'mcid'

version: 1.0.0
config-version: 2

profile: mcid

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"
  - "logs"

models:
  mcid:
    +database: cidades
    empreendimento_far_dbt:
      +materialized: table
      +schema: empreendimento_far
      views:
        +materialized: view

on-run-start:
  - '{{create_udfs()}}'
