      - name: novo_mcmv_far_consolidado
        description: >
          Tabela consolidada do GFAR com todas as propostas FAR do Novo MCMV.
          Contﾃｩm 15.091 registros (13.216 propostas ﾃｺnicas), incluindo propostas
          nﾃ｣o contratadas, contratadas e distratadas. Todas as colunas sﾃ｣o text.
      - name: novo_mcmv_far_cad_pj_mensal
        description: >
          Cadastro detalhado de pessoa jurﾃｭdica (empreendimento) com 82 colunas.
          Contﾃｩm 822 empreendimentos contratados com dados de composiﾃｧﾃ｣o financeira,
          coordenadas GPS, tipologia, construtora e datas-chave. Snapshot mensal.
      - name: novo_mcmv_far_obra_mensal
        description: >
          Dados de evoluﾃｧﾃ｣o fﾃｭsica da obra com 40 colunas. Contﾃｩm 822 registros
          (1 por empreendimento). Inclui percentual previsto/realizado, situaﾃｧﾃ｣o
          da obra, UHs concluﾃｭdas e datas de paralisaﾃｧﾃ｣o/retomada.
      - name: novo_mcmv_far_financeiro_mensal
        description: >
          Dados de liberaﾃｧﾃｵes financeiras com sﾃｩrie temporal. Contﾃｩm 6.069 registros
          para 638 APFs (mﾃｩdia de 9,5 liberaﾃｧﾃｵes por empreendimento). Detalha
          valores pagos por componente (obra, terreno, PTS, INCC).
      - name: dados_prioritarios_recebidos_caixa_empreendimentos
        description: >
          Dados prioritﾃ｡rios recebidos da CAIXA com snapshot consolidado.
          Contﾃｩm 4.443 empreendimentos FAR com situaﾃｧﾃ｣o, percentual de execuﾃｧﾃ｣o,
          valores contratados/desembolsados, UHs e coordenadas geogrﾃ｡ficas.
      - name: api_ibge_uf
        description: >
          Tabela de referﾃｪncia do IBGE com os 27 estados brasileiros.
          Contﾃｩm sigla, nome completo e regiﾃ｣o. Usada para enriquecer dashboards.
      - name: api_ibge_regioes
        description: >
          Tabela de referﾃｪncia do IBGE com as 5 regiﾃｵes brasileiras.
          Contﾃｩm id e nome (Norte, Nordeste, Centro-Oeste, Sudeste, Sul).
      - name: dados_prioritarios_recebidos_caixa_entregas
        description: >
          Snapshot de entregas reportadas pela CAIXA. Contﾃｩm 11.540 registros
          de mﾃｺltiplos programas.

      # Fontes FDS (Entidades)
      - name: novo_mcmv_fds_cad_pj_mensal
        description: >
          Cadastro PJ mensal do MCMV Entidades (FDS). 343 empreendimentos
          contratados a partir de ago/2024. 89 colunas text com dados de
          Entidade Organizadora, construtora, UHs, composiﾃｧﾃ｣o financeira,
          GPS, datas, substituiﾃｧﾃ｣o de EO e indicadores. Snapshot mensal.
      - name: novo_mcmv_fds_obra_mensal
        description: >
          Evoluﾃｧﾃ｣o fﾃｭsica da obra FDS. 343 registros (1 por empreendimento).
          47 colunas text com situaﾃｧﾃ｣o da operaﾃｧﾃ｣o, percentual previsto/realizado,
          UHs concluﾃｭdas/alienadas, paralisaﾃｧﾃ｣o, invasﾃ｣o e datas de entrega.
      - name: novo_mcmv_fds_financeiro_mensal
        description: >
          Sﾃｩrie temporal de liberaﾃｧﾃｵes financeiras FDS. 16.124 registros para
          750 APFs (111 do Novo MCMV). APF em 6 dﾃｭgitos. ATENﾃ僌グ: ic_credito=0
          sﾃ｣o liberaﾃｧﾃｵes reais (valores negativos), usar ABS(). ic_credito=1
          sﾃ｣o devoluﾃｧﾃｵes (20 registros).
      - name: novo_mcmv_fds_trabalho_social_mensal
        description: >
          Acompanhamento do Trabalho Tﾃｩcnico Social FDS. 89 registros com
          situaﾃｧﾃ｣o, datas de aprovaﾃｧﾃ｣o PTS, convﾃｪnio, relatﾃｳrios e portaria.
      
      # Fontes Complementares
      - name: int_empreendimentos_int_059_fds_caixa_pj
        description: >
          Tabela complementar da CAIXA (INT 059) com 856 registros.
          Contﾃｩm dados do legado e do Novo MCMV. Importante para filtros
          como situacao_gefus e fase_contrato.
      - name: api_ibge_municipios
        description: >
          Tabela de referﾃｪncia do IBGE com os municﾃｭpios brasileiros.
          Contﾃｩm id, nome, microrregiﾃ｣o, mesorregiﾃ｣o e cﾃｳdigos relacionados.

