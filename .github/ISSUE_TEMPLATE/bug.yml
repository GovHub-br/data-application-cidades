name: Bug Report
description: Reportar um erro
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Descrição
      description: O que aconteceu?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Passos para reproduzir
      description: Como reproduzir o erro?

  - type: textarea
    id: expected
    attributes:
      label: Comportamento esperado
      description: O que deveria acontecer?

  - type: textarea
    id: evidence
    attributes:
      label: Evidências
      description: Logs, prints, etc